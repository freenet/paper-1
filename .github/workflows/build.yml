name: Build whitepaper

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-bibtex-extra \
            texlive-science \
            biber \
            latexmk

      - name: Build PDF
        run: make

      - name: Rename PDF
        run: cp main.pdf freenet-whitepaper.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: freenet-whitepaper
          path: freenet-whitepaper.pdf

      - name: Update "latest" release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Auto-built from `main` on every push.
            PDF: `freenet-whitepaper.pdf`
          files: freenet-whitepaper.pdf
          make_latest: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
